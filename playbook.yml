---
- name: Atelier Ansible avec gestion DEV / PROD
  hosts: "{{ env }}"
  become: true
  gather_facts: true

  vars:
    env: dev  # valeur par défaut (modifiable en ligne de commande)
    page_dest: /var/www/html/index.html
    yarn_repo_file: /etc/apt/sources.list.d/yarn.list
    yarn_repo_disabled_file: /etc/apt/sources.list.d/yarn.list.disabled

  vars_files:
    - "vars/{{ env }}.yml"

  tasks:
    - name: Afficher le système cible
      debug:
        msg:
          - "Hôte cible : {{ inventory_hostname }}"
          - "OS : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Python : {{ ansible_python.executable | default('inconnu') }}"
          - "Environnement : {{ env }}"

    - name: Vérifier si le dépôt Yarn existe
      stat:
        path: "{{ yarn_repo_file }}"
      register: yarn_repo_stat

    - name: Avertissement si dépôt Yarn présent (DEV uniquement)
      debug:
        msg:
          - "Dépôt Yarn détecté : {{ yarn_repo_file }}"
          - "Peut provoquer un échec de apt update"
      when: yarn_repo_stat.stat.exists and env == "dev"

    - name: Désactiver temporairement le dépôt Yarn (DEV)
      command: mv "{{ yarn_repo_file }}" "{{ yarn_repo_disabled_file }}"
      when: yarn_repo_stat.stat.exists and env == "dev"
      changed_when: true

    - name: Supprimer le dépôt Yarn (PROD)
      file:
        path: "{{ yarn_repo_file }}"
        state: absent
      when: yarn_repo_stat.stat.exists and env == "prod"

    - name: Mettre à jour le cache APT
      apt:
        update_cache: true

    - name: Installer nginx
      apt:
        name: nginx
        state: present

    - name: Vérifier que le répertoire web existe
      file:
        path: /var/www/html
        state: directory
        owner: root
        group: root
        mode: "{{ web_dir_mode }}"

    - name: Déployer la page HTML (selon environnement)
      copy:
        src: "{{ page_src }}"
        dest: "{{ page_dest }}"
        owner: root
        group: root
        mode: "0644"
      notify: Redémarrer nginx

    - name: Message spécifique DEV
      debug:
        msg: "Mode développement actif"
      when: env == "dev"

    - name: Message spécifique PROD
      debug:
        msg: "Mode production sécurisé actif"
      when: env == "prod"

    - name: Activer nginx au démarrage
      service:
        name: nginx
        enabled: true

    - name: Démarrer nginx
      service:
        name: nginx
        state: started

    - name: Vérifier que le site répond en HTTP
      uri:
        url: http://localhost
        method: GET
        status_code: 200
        return_content: true
      register: test_http
      retries: 5
      delay: 2
      until: test_http.status == 200

    - name: Afficher le code HTTP retourné
      debug:
        msg: "Code HTTP : {{ test_http.status }}"

    - name: Afficher un extrait du contenu HTTP
      debug:
        msg: "{{ test_http.content[:200] if test_http.content is defined else 'Aucun contenu' }}"

  handlers:
    - name: Redémarrer nginx
      service:
        name: nginx
        state: restarted
